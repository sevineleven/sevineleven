name: Update Blog Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch RSS and generate SVG
        uses: actions/github-script@v7
        with:
          script: |
            const https = require('https');

            function fetchRSS(url) {
              return new Promise((resolve, reject) => {
                https.get(url, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(data));
                }).on('error', reject);
              });
            }

            const CATEGORY_COLORS = {
              '백엔드':        '#5aacf0',
              '프론트엔드':    '#b388ff',
              '사이드프로젝트':'#f5a742',
              '인프라':        '#f5c542',
              'CS':            '#3dd68c',
              '일상':          '#7a7a90',
              '기타':          '#7a7a90',
            };

            const xml = await fetchRSS('https://blog.sevin.dev/feed.xml');
            const items = [...xml.matchAll(/<item>([\s\S]*?)<\/item>/g)];

            const posts = items.slice(0, 5).map(([, item]) => {
              const title    = item.match(/<title><!\[CDATA\[(.*?)\]\]>/)?.[1] ?? '';
              const date     = item.match(/<pubDate>(.*?)<\/pubDate>/)?.[1] ?? '';
              const category = item.match(/<category><!\[CDATA\[(.*?)\]\]>/)?.[1] ?? '기타';
              const d = new Date(date);
              const dateStr = isNaN(d.getTime()) ? '' :
                `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
              const color = CATEGORY_COLORS[category] ?? '#7a7a90';
              const maxLen = 28;
              const display = title.length > maxLen ? title.slice(0, maxLen) + '…' : title;
              return { title: display, dateStr, category, color };
            });

            const W = 580, ROW = 28, TITLE_X = 190;

            const whoamiLines = [
              { key: 'name', val: 'parksevin',         color: '#e0e0e6' },
              { key: 'role', val: 'backend developer',  color: '#e0e0e6' },
              { key: 'blog', val: 'blog.sevin.dev',     color: '#5aacf0' },
              { key: 'web',  val: 'sevin.dev',          color: '#3dd68c' },
            ];
            const WHOAMI_START_Y = 66;
            const WHOAMI_ROW = 22;
            const whoamiSvg = whoamiLines.map((l, i) => {
              const y = WHOAMI_START_Y + i * WHOAMI_ROW;
              return `<text x="38" y="${y}" font-family="monospace" font-size="12" fill="#56566a">${l.key}</text>
              <text x="100" y="${y}" font-family="monospace" font-size="12" fill="${l.color}">${l.val}</text>`;
            }).join('\n');

            const DIV_Y  = WHOAMI_START_Y + whoamiLines.length * WHOAMI_ROW + 12;
            const CMD_Y  = DIV_Y + 28;
            const POST_Y = CMD_Y + 28;
            const H      = POST_Y + posts.length * ROW + 18;

            const postSvg = posts.map((p, i) => {
              const y = POST_Y + i * ROW;
              return `<text x="22" y="${y}" font-family="monospace" font-size="12" fill="#3dd68c">▸</text>
              <text x="38" y="${y}" font-family="monospace" font-size="12" fill="${p.color}">[${p.category}]</text>
              <text x="${TITLE_X}" y="${y}" font-family="monospace" font-size="12" fill="#e0e0e6">${p.title}</text>
              <text x="${W - 18}" y="${y}" font-family="monospace" font-size="11" fill="#56566a" text-anchor="end">${p.dateStr}</text>`;
            }).join('\n');

            const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
              <rect width="${W}" height="${H}" rx="10" fill="#0f0f12"/>
              <rect width="${W}" height="38" rx="10" fill="#17171b"/>
              <rect y="28" width="${W}" height="10" fill="#17171b"/>
              <rect y="38" width="${W}" height="1" fill="#272730"/>
              <circle cx="18" cy="19" r="5" fill="#ff5f57"/>
              <circle cx="36" cy="19" r="5" fill="#ffbd2e"/>
              <circle cx="54" cy="19" r="5" fill="#28ca41"/>
              <text x="${W/2}" y="24" font-family="monospace" font-size="11" fill="#56566a" text-anchor="middle">sevineleven@dev — ~</text>
              <text x="22" y="54" font-family="monospace" font-size="12" fill="#3dd68c">$</text>
              <text x="36" y="54" font-family="monospace" font-size="12" fill="#56566a">whoami</text>
              ${whoamiSvg}
              <rect x="22" y="${DIV_Y}" width="${W - 44}" height="1" fill="#272730"/>
              <text x="22" y="${CMD_Y}" font-family="monospace" font-size="12" fill="#3dd68c">$</text>
              <text x="36" y="${CMD_Y}" font-family="monospace" font-size="12" fill="#56566a">cat recent-posts.md</text>
              ${postSvg}
            </svg>`;

            const { writeFileSync } = require('fs');
            writeFileSync('terminal.svg', svg.trim());

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terminal.svg
          git diff --staged --quiet || git commit -m "chore: update terminal svg"
          git push
